version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rule_service_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rule_service_network

  rule_service:
    build:
      context: ../../
      dockerfile: Services/rule-service/Dockerfile
    container_name: rule_service_api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      LOG_LEVEL: ${LOG_LEVEL}
      RULE_ENGINE_TYPE: ${RULE_ENGINE_TYPE}
      MAX_EVALUATION_TIME_MS: ${MAX_EVALUATION_TIME_MS}
      CACHE_RULE_RESULTS: ${CACHE_RULE_RESULTS}
      CACHE_DURATION_MINUTES: ${CACHE_DURATION_MINUTES}
    ports:
      - "${API_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rule_service_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  rule_service_network:
    driver: bridge
