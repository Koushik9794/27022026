version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: catalog_service_db
    environment:
      POSTGRES_DB: ${DB_NAME:-catalog_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-6432}:5432" # Using 64xx series to avoid conflicts
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog_service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Server=postgres;Database=${DB_NAME:-catalog_service};User Id=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres};Port=5432;"
      ASPNETCORE_URLS: "http://+:80"
    ports:
      - "6402:80" # Catalog service on port 6402
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  catalog_db_data:
