version: 0.2

# ────────────────────────────────────────────────────────────────────────────
# ACCOUNT TOPOLOGY (two accounts)
#
#   CI/CD account (CodeBuild runs here)  : 793912575116
#   Production account (ECR + ECS + CDK) : 771355239036  ← Infra_setup + ECR + Fargate
#
# ROLE ASSUMPTION CHAIN:
#   gss-admin-codebuild-role (793912575116)
#     → sts:AssumeRole → Infra_setup (771355239036)   [--role-arn below]
#       → cdk-hnb659fds-deploy-role (771355239036)
#         → cdk-hnb659fds-cfn-exec-role (771355239036)
#           → CloudFormation executes stacks in production account
#
# PREREQUISITES (one-time, done outside this buildspec):
#   1. Infra_setup trust policy must trust: arn:aws:iam::793912575116:role/gss-admin-codebuild-role
#   2. CDK bootstrap in production account: cdk bootstrap aws://771355239036/ap-south-1 --trust 793912575116
#   3. cdk-hnb659fds-deploy-role must also trust: arn:aws:iam::771355239036:role/Infra_setup
# ────────────────────────────────────────────────────────────────────────────

env:
  variables:
    ECR_URI: "771355239036.dkr.ecr.ap-south-1.amazonaws.com/gss-backend"
    AWS_DEFAULT_REGION: "ap-south-1"
    CDK_DEPLOY_ROLE_ARN: "arn:aws:iam::771355239036:role/Infra_setup"
    # Production account — same account that hosts ECR, Infra_setup, and ECS
    RUNTIME_ACCOUNT_ID: "771355239036"

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:

      # ── [INSTALL/1] Starting directory ──────────────────────────────────────
      - echo "===== WORKING DIRECTORY ====="
      - pwd
      - echo "===== CURRENT FILES ====="
      - ls -la

      # Install CDK CLI globally
      - npm install -g aws-cdk@2

      # ── [INSTALL/2] After cd gss-runtime-infra ──────────────────────────────
      - cd gss-runtime-infra
      - echo "===== WORKING DIRECTORY ====="
      - pwd
      - echo "===== CURRENT FILES ====="
      - ls -la

      # Install ALL dependencies (including devDependencies: typescript, ts-node, @types/node)
      # --include=dev ensures tsc is available even if npm prunes devDeps by default in CI.
      # Compile TypeScript → dist/ so CDK runs node dist/bin/deploy.js (no ts-node needed).
      - npm install --include=dev

      # ── [INSTALL/3] After npm run build ─────────────────────────────────────
      - npm run build
      - echo "===== WORKING DIRECTORY ====="
      - pwd
      - echo "===== CURRENT FILES ====="
      - ls -la

      - cd ..

  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 771355239036.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - docker build -t $ECR_URI:latest Services/admin-service
      - docker push $ECR_URI:latest

  post_build:
    commands:

      # ── [POST_BUILD/4] Start of post_build ──────────────────────────────────
      - echo "===== WORKING DIRECTORY ====="
      - pwd
      - echo "===== CURRENT FILES ====="
      - ls -la

      # ── DEBUG: Full filesystem snapshot ────────────────────────────────────
      - echo "================ DEBUG: WHERE AM I ================="
      - pwd
      - echo "================ DEBUG: ROOT CONTENT ================="
      - ls -la
      - echo "================ DEBUG: DIST EXISTS? ================="
      - ls -la dist || echo "NO DIST FOLDER"
      - echo "================ DEBUG: FULL TREE ================="
      - ls -R .

      # ── [POST_BUILD/5] After cd gss-runtime-infra ───────────────────────────
      - cd gss-runtime-infra
      - echo "===== WORKING DIRECTORY ====="
      - pwd
      - echo "===== CURRENT FILES ====="
      - ls -la

      # ── Step 1: CodeBuild native identity ──────────────────────────────────
      # Should be: arn:aws:iam::793912575116:role/gss-admin-codebuild-role
      - echo "========== [1/6] CODEBUILD NATIVE IDENTITY =========="
      - aws sts get-caller-identity

      # ── Step 2: Environment variables ──────────────────────────────────────
      - echo "========== [2/6] CDK ENVIRONMENT VARIABLES =========="
      - echo "CDK_DEFAULT_ACCOUNT  = $RUNTIME_ACCOUNT_ID"
      - echo "CDK_DEFAULT_REGION   = $AWS_DEFAULT_REGION"
      - echo "CDK_DEPLOY_ROLE_ARN  = $CDK_DEPLOY_ROLE_ARN"
      - echo "ECR_URI              = $ECR_URI"

      # ── Step 3: Confirm compiled JS exists ─────────────────────────────────
      # dist/bin/deploy.js must exist (produced by npm run build in install phase).
      # If missing → tsc failed silently — check install phase logs.
      - echo "========== [3/6] COMPILED OUTPUT CHECK =========="
      - ls -la dist/bin/deploy.js

      # ── Step 4: Attempt explicit AssumeRole ────────────────────────────────
      # If this step fails → trust policy on Infra_setup is wrong.
      - echo "========== [4/6] ASSUME DEPLOY ROLE (explicit test) =========="
      - aws sts assume-role --role-arn $CDK_DEPLOY_ROLE_ARN --role-session-name diagnostic-session --duration-seconds 900 || echo "FAILED TO ASSUME ROLE — check trust policy on Infra_setup"

      # ── Step 5: CDK synth (runs gss-runtime-infra/dist/bin/deploy.js) ───────
      - echo "========== [5/6] CDK SYNTH (verbose) =========="
      - CDK_DEFAULT_ACCOUNT=$RUNTIME_ACCOUNT_ID CDK_DEFAULT_REGION=$AWS_DEFAULT_REGION npx cdk synth --no-lookups -v

      # ── Step 6: CDK deploy (full debug output) ─────────────────────────────
      # Errors are NOT suppressed — let the build fail with the real cause.
      #
      # What each error means:
      #   AccessDenied: sts:AssumeRole   → Infra_setup trust policy missing CodeBuild role
      #   AccessDenied: iam:CreateRole   → SCP blocks IAM in production account
      #   bootstrap bucket not found     → run: cdk bootstrap aws://771355239036/ap-south-1
      #   Unable to resolve AWS account  → CDK_DEFAULT_ACCOUNT not set correctly
      - echo "========== [6/6] CDK DEPLOY (debug + verbose) =========="
      - CDK_DEFAULT_ACCOUNT=$RUNTIME_ACCOUNT_ID CDK_DEFAULT_REGION=$AWS_DEFAULT_REGION npx cdk deploy --all --role-arn $CDK_DEPLOY_ROLE_ARN --require-approval never -v --debug
